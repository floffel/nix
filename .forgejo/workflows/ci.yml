name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  nix-flake-check:
    runs-on: native
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: just test-eval
        run: nix flake check --accept-flake-config

  lint:
    runs-on: native
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: just lint
        run: nix develop --accept-flake-config --command sh -c '
          statix check --ignore 'scratch/**' . &&
          deadnix --fail . &&
          nixpkgs-fmt --check **/*.nix
        '

  vm-tests:
    runs-on: native
    needs: nix-flake-check
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: Check KVM available
        run: |
          if [ -c /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "KVM available"
          else
            echo "KVM not available — VM tests require /dev/kvm passthrough on Proxmox LXC"
            echo "Add to /etc/pve/lxc/<nxforgejo-runner-id>.conf:"
            echo "  lxc.cgroup2.devices.allow: c 10:232 rwm"
            echo "  lxc.mount.entry: /dev/kvm dev/kvm none bind,optional,create=file"
            exit 1
          fi

      - name: Run VM integration tests
        run: |
          nix build .#vmTests.x86_64-linux.vm-nixnginx --accept-flake-config -L --no-link
          nix build .#vmTests.x86_64-linux.vm-nixpostgres --accept-flake-config -L --no-link
          nix build .#vmTests.x86_64-linux.vm-nixnsd --accept-flake-config -L --no-link
          nix build .#vmTests.x86_64-linux.vm-nixunbound --accept-flake-config -L --no-link
          nix build .#vmTests.x86_64-linux.vm-nixforgejo --accept-flake-config -L --no-link
          nix build .#vmTests.x86_64-linux.vm-nixidm --accept-flake-config -L --no-link
          nix build .#vmTests.x86_64-linux.vm-nixmonitoring --accept-flake-config -L --no-link