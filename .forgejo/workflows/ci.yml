name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nix-flake-check:
    runs-on: native
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: Flake check — evaluate all 15 NixOS container configs
        run: nix flake check --accept-flake-config

  lint:
    runs-on: native
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: Lint .nix files
        run: nix develop --accept-flake-config --command sh -c '
          statix check --ignore 'scratch/**' . &&
          deadnix --fail . &&
          nixpkgs-fmt --check **/*.nix
        '